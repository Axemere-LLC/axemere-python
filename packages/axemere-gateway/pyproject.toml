[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "axemere-gateway"
version = "0.1.6"
description = "Axemere AI Gateway Python SDK — framework-independent async client"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
dependencies = [
    "httpx>=0.27.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/axemere"]
