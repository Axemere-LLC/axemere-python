[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "axemere-gateway-langchain"
version = "0.1.0"
description = "Axemere AI Gateway LangChain integration — ChatAiGateway BaseChatModel"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
dependencies = [
    "axemere-gateway>=0.1.0",
    "httpx>=0.27.0",
    "langchain-core>=0.3.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/axemere"]
