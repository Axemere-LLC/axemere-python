[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "axemere-gateway-anthropic"
version = "0.1.0"
description = "Axemere AI Gateway Anthropic SDK wrapper — drop-in Anthropic/AsyncAnthropic subclasses"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
dependencies = [
    "axemere-gateway>=0.1.0",
    "anthropic>=0.28.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/axemere"]
