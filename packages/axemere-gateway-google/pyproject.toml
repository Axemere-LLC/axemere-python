[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "axemere-gateway-google"
version = "0.1.6"
description = "Axemere AI Gateway Google GenAI SDK wrapper — genai_client factory for google-genai"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
dependencies = [
    "axemere-gateway>=0.1.0",
    "google-genai>=1.0.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/axemere"]
