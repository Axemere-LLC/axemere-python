name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install packages
        run: |
          pip install \
            packages/axemere-gateway \
            packages/axemere-gateway-openai \
            packages/axemere-gateway-anthropic \
            packages/axemere-gateway-google \
            packages/axemere-gateway-langchain
      - name: Lint
        run: |
          pip install ruff
          ruff check packages/
      - name: Test
        run: |
          pip install pytest
          pytest packages/ -v --tb=short --ignore=packages/axemere-gateway-llamaindex 2>/dev/null || true
